name: Fetch Stooq Data

on:
  schedule:
    # Weekday evenings — Mon–Fri at 21:00 UTC (5pm ET)
    - cron: '0 21 * * 1-5'
    # Sunday evening — 20:00 UTC (4pm ET)
    - cron: '0 20 * * 0'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Stooq data
        run: python fetch_stooq.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update Stooq data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
